<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>Meem Yaser Studio — Webtoon Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --font: 'Inter', 'Noto Sans Arabic', system-ui, sans-serif;
  --landing-bg: #FAFAF8;
  --landing-text: #111;
  --landing-muted: #666;
  --reader-bg: #0A0A0A;
  --reader-text: #f5f5f5;
  --reader-muted: #888;
  --accent: #D4AF37;
  --comment-bg: rgba(212,175,55,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font); overflow: hidden; overscroll-behavior: none; }

.view { position: fixed; inset: 0; display: none; opacity: 0; transition: opacity 0.3s ease; }
.view.active { display: flex; flex-direction: column; opacity: 1; }

/* —— LANDING —— */
#landing-view {
  background: var(--landing-bg);
  color: var(--landing-text);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.landing-wrap { max-width: 480px; margin: 0 auto; padding: 60px 20px 40px; }

.studio-name { font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--landing-muted); margin-bottom: 6px; }
h1 { font-size: clamp(36px, 8vw, 56px); font-weight: 700; letter-spacing: -0.04em; line-height: 1; margin-bottom: 12px; }
.tagline { font-size: 17px; color: var(--landing-muted); line-height: 1.5; margin-bottom: 32px; }

.featured-cover {
  width: 100%; aspect-ratio: 3/4; border-radius: 16px;
  background: linear-gradient(135deg, #2a2a2a, #1a1a1a); overflow: hidden;
  position: relative; margin-bottom: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.featured-cover img { width: 100%; height: 100%; object-fit: cover; }
.cover-badge {
  position: absolute; top: 16px; left: 16px;
  background: var(--accent); color: #000; font-size: 11px; font-weight: 700;
  padding: 6px 12px; border-radius: 6px; letter-spacing: 0.05em;
}

.btn-row { display: flex; gap: 10px; margin-bottom: 40px; }
.btn {
  flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600;
  font-family: var(--font); border: none; cursor: pointer; text-align: center;
  transition: all 0.15s ease;
}
.btn-primary { background: #111; color: #fff; }
.btn-secondary { background: #f0f0ec; color: #111; }

.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--landing-muted); margin-bottom: 16px; }

.chapter-grid { display: flex; flex-direction: column; gap: 8px; }
.chapter-row {
  display: flex; align-items: center; gap: 16px; padding: 16px;
  background: #fff; border-radius: 12px; cursor: pointer;
  transition: all 0.15s ease; border: 1px solid rgba(0,0,0,0.04);
}
.chapter-row:hover { background: #f8f8f6; transform: translateX(4px); }
.chapter-row:active { transform: scale(0.98); }

.ch-thumb { width: 56px; height: 56px; border-radius: 10px; background: linear-gradient(135deg, #ddd, #bbb); flex-shrink: 0; overflow: hidden; }
.ch-thumb img { width: 100%; height: 100%; object-fit: cover; }
.ch-info { flex: 1; }
.ch-num { font-size: 14px; font-weight: 600; }
.ch-date { font-size: 12px; color: var(--landing-muted); margin-top: 2px; }
.ch-status { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px; }
.ch-status.free { background: #e8f5e9; color: #2e7d32; }
.ch-status.locked { background: #fff3e0; color: #ef6c00; }

/* —— READER: Webtoon vertical scroll —— */
#reader-view { background: var(--reader-bg); color: var(--reader-text); }

.reader-scroll {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth; padding-bottom: max(20px, env(safe-area-inset-bottom));
}

.webtoon-strip {
  display: flex; flex-direction: column; align-items: center;
  padding: 0; max-width: 600px; margin: 0 auto;
}

.webtoon-page {
  width: 100%; display: block;
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.webtoon-page.visible { opacity: 1; transform: translateY(0); }
.webtoon-page img { width: 100%; display: block; }

/* Comment bubbles on pages — Webtoon style */
.page-comments { position: relative; }
.comment-bubble {
  position: absolute; left: 50%; transform: translateX(-50%);
  background: var(--comment-bg); border: 1px solid rgba(212,175,55,0.2);
  padding: 10px 16px; border-radius: 16px; font-size: 13px;
  max-width: 80%; backdrop-filter: blur(8px);
  margin-top: -20px; z-index: 10;
}
.comment-bubble .author { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 2px; }

/* Sticky header */
.sticky-header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, rgba(10,10,10,0.95) 60%, transparent);
  padding: max(12px, env(safe-area-inset-top)) 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  transition: opacity 0.3s ease;
}
.sticky-header.hidden { opacity: 0; pointer-events: none; }

.back-btn {
  color: var(--reader-text); text-decoration: none; font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 4px; opacity: 0.7;
}
.header-title { font-size: 14px; font-weight: 600; opacity: 0.6; }
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.04);
  color: var(--reader-text); font-size: 16px; display: grid; place-items: center;
  cursor: pointer;
}

/* Progress bar — top of screen, like Webtoon apps */
.top-progress {
  position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 200;
  background: rgba(255,255,255,0.05);
}
.top-progress-fill {
  height: 100%; background: var(--accent); width: 0%;
  transition: width 0.1s linear;
}

/* Floating comment input */
.comment-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(15,15,15,0.95); backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding: 12px 16px max(12px, env(safe-area-inset-bottom));
  display: flex; gap: 10px; align-items: center; z-index: 150;
  transform: translateY(0); transition: transform 0.3s ease;
}
.comment-bar.hidden { transform: translateY(100%); }
.comment-input {
  flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 10px 16px; color: var(--reader-text); font-size: 14px;
  font-family: var(--font); outline: none;
}
.comment-input::placeholder { color: var(--reader-muted); }
.send-btn {
  width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #000;
  border: none; font-size: 18px; cursor: pointer; display: grid; place-items: center;
}

/* Toast */
.toast {
  position: fixed; top: max(20px, env(safe-area-inset-top) + 10px); left: 50%;
  transform: translateX(-50%) translateY(-20px); background: rgba(30,30,30,0.95);
  color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 14px;
  opacity: 0; transition: all 0.3s ease; z-index: 300; pointer-events: none;
  backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing-view" class="view active">
  <div class="landing-wrap">
    <div class="studio-name">Restless Worlds</div>
    <h1>Moons Road</h1>
    <p class="tagline">Scroll through the story. One continuous journey.</p>
    
    <div class="featured-cover">
      <img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?w=600&h=800&fit=crop" alt="Cover">
      <div class="cover-badge">NEW CHAPTER</div>
    </div>
    
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startReading()">▶ Read Chapter 1</button>
      <button class="btn btn-secondary" onclick="toggleLang()">EN / AR</button>
    </div>
    
    <div class="section-label">All Chapters</div>
    <div class="chapter-grid">
      <div class="chapter-row" onclick="startReading()">
        <div class="ch-thumb"><img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=100&h=100&fit=crop"></div>
        <div class="ch-info">
          <div class="ch-num">Chapter 1 — The Beginning</div>
          <div class="ch-date">Apr 22, 2026 · 8 pages</div>
        </div>
        <div class="ch-status free">FREE</div>
      </div>
      <div class="chapter-row" style="opacity:0.5">
        <div class="ch-thumb"><img src="https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=100&h=100&fit=crop"></div>
        <div class="ch-info">
          <div class="ch-num">Chapter 2 — The Road</div>
          <div class="ch-date">Coming soon</div>
        </div>
        <div class="ch-status locked">LOCKED</div>
      </div>
    </div>
  </div>
</div>

<!-- READER -->
<div id="reader-view" class="view">
  <div class="top-progress"><div class="top-progress-fill" id="progress-bar"></div></div>
  
  <div class="sticky-header" id="sticky-header">
    <a href="#" class="back-btn" onclick="exitReader(event)">←</a>
    <div class="header-title">Ch.1 — The Beginning</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleComments()">💬</button>
      <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
    </div>
  </div>
  
  <div class="reader-scroll" id="scroll-container">
    <div class="webtoon-strip" id="strip"></div>
  </div>
  
  <div class="comment-bar" id="comment-bar">
    <input type="text" class="comment-input" id="comment-input" placeholder="Add a comment..." onkeypress="if(event.key==='Enter')sendComment()">
    <button class="send-btn" onclick="sendComment()">→</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PAGES = [
  'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1618336753974-aae8e04506aa?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1635805737707-575885ab0820?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1560972550-aba3456b5564?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1607604276583-eef5f0b7fe7a?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1560167016-022b78a0258e?w=800&h=1200&fit=crop',
];

const PAGE_COMMENTS = {
  1: [{ author: 'Meem Yaser', text: 'This transition was inspired by classical Arabic manuscripts.' }],
  3: [{ author: 'Sara K.', text: 'The symbolism here 🔥' }],
  5: [{ author: 'Admin', text: 'Notice the shadow direction — foreshadowing Chapter 3' }],
};

let commentsVisible = true;
let headerVisible = true;
let lastScrollY = 0;

function startReading() {
  document.getElementById('landing-view').classList.remove('active');
  document.getElementById('reader-view').classList.add('active');
  renderStrip();
  setupScroll();
}

function exitReader(e) {
  if (e) e.preventDefault();
  document.getElementById('reader-view').classList.remove('active');
  document.getElementById('landing-view').classList.add('active');
}

function renderStrip() {
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  PAGES.forEach((src, i) => {
    const pageEl = document.createElement('div');
    pageEl.className = 'webtoon-page';
    pageEl.dataset.index = i;
    
    let html = `<img src="${src}" alt="Page ${i+1}" loading="lazy">`;
    
    if (PAGE_COMMENTS[i] && commentsVisible) {
      html += `<div class="page-comments">`;
      PAGE_COMMENTS[i].forEach(c => {
        html += `<div class="comment-bubble"><div class="author">${c.author}</div>${c.text}</div>`;
      });
      html += `</div>`;
    }
    
    pageEl.innerHTML = html;
    strip.appendChild(pageEl);
  });
  
  // IntersectionObserver for lazy reveal
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.1 });
  
  document.querySelectorAll('.webtoon-page').forEach(el => obs.observe(el));
}

function setupScroll() {
  const container = document.getElementById('scroll-container');
  const progress = document.getElementById('progress-bar');
  const header = document.getElementById('sticky-header');
  
  container.addEventListener('scroll', () => {
    const y = container.scrollTop;
    const max = container.scrollHeight - container.clientHeight;
    progress.style.width = (y / max * 100) + '%';
    
    // Hide/show header on scroll direction
    if (y > lastScrollY && y > 100) {
      header.classList.add('hidden');
      document.getElementById('comment-bar').classList.add('hidden');
    } else {
      header.classList.remove('hidden');
      document.getElementById('comment-bar').classList.remove('hidden');
    }
    lastScrollY = y;
  }, { passive: true });
}

function toggleComments() {
  commentsVisible = !commentsVisible;
  renderStrip();
  toast(commentsVisible ? 'Comments shown' : 'Comments hidden');
}

function toggleSettings() {
  toast('Settings: Direction, Fit mode');
}

function sendComment() {
  const input = document.getElementById('comment-input');
  if (!input.value.trim()) return;
  toast('Comment posted!');
  input.value = '';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleLang() {
  const isRTL = document.documentElement.dir === 'rtl';
  document.documentElement.dir = isRTL ? 'ltr' : 'rtl';
  toast(isRTL ? 'English' : 'Arabic');
}
</script>
</body>
</html>
