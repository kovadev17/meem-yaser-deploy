<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="theme-color" content="#FAFAF8">
<title>Meem Yaser Studio — Dropbox Pure Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --font: 'Inter', 'Noto Sans Arabic', -apple-system, BlinkMacSystemFont, sans-serif;
  --landing-bg: #FAFAF8;
  --landing-text: #111;
  --landing-muted: #666;
  --reader-bg: #050505;
  --reader-text: #f0f0f0;
  --reader-muted: #888;
  --accent: #D4AF37;
  --pin-color: #D4AF37;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font); overflow: hidden; overscroll-behavior: none; }

/* —— VIEW SYSTEM —— */
.view { position: fixed; inset: 0; display: none; opacity: 0; transition: opacity 0.3s ease; }
.view.active { display: flex; flex-direction: column; opacity: 1; }

/* —— LANDING: Dropbox Paper style —— */
#landing-view {
  background: var(--landing-bg);
  color: var(--landing-text);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.landing-container { max-width: 680px; margin: 0 auto; padding: 80px 24px 60px; }

.brand { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--landing-muted); margin-bottom: 8px; }

h1 { font-size: clamp(32px, 6vw, 52px); font-weight: 600; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 16px; }

.subtitle { font-size: 18px; color: var(--landing-muted); line-height: 1.5; margin-bottom: 40px; max-width: 480px; }

.cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 60px; }
.btn {
  padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 500;
  font-family: var(--font); cursor: pointer; border: none; transition: all 0.15s ease;
}
.btn-primary { background: #111; color: #fff; }
.btn-primary:hover { background: #333; }
.btn-secondary { background: transparent; color: #111; border: 1px solid rgba(0,0,0,0.15); }
.btn-secondary:hover { background: rgba(0,0,0,0.04); }

/* Manga list — ultra clean */
.section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--landing-muted); margin-bottom: 20px; }

.manga-list { display: flex; flex-direction: column; gap: 1px; background: rgba(0,0,0,0.06); border-radius: 12px; overflow: hidden; }
.manga-item {
  display: flex; align-items: center; gap: 16px; padding: 16px 20px;
  background: var(--landing-bg); cursor: pointer; transition: background 0.15s ease;
}
.manga-item:hover { background: #f0f0ec; }
.manga-item:active { background: #e8e8e4; }

.manga-thumb { width: 48px; height: 64px; border-radius: 6px; background: linear-gradient(135deg, #ddd, #bbb); flex-shrink: 0; overflow: hidden; }
.manga-thumb img { width: 100%; height: 100%; object-fit: cover; }

.manga-info { flex: 1; min-width: 0; }
.manga-name { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.manga-detail { font-size: 13px; color: var(--landing-muted); margin-top: 2px; }

.manga-arrow { color: var(--landing-muted); font-size: 18px; }
.lock-badge { font-size: 11px; background: rgba(0,0,0,0.06); padding: 3px 8px; border-radius: 4px; margin-left: 8px; }

/* —— READER: Dropbox image viewer style —— */
#reader-view { background: var(--reader-bg); color: var(--reader-text); }

/* Chrome — minimal, fades out */
.reader-chrome {
  position: absolute; left: 0; right: 0; z-index: 100;
  padding: 16px 20px;
  transform: translateY(0); opacity: 1;
  transition: transform 0.3s ease, opacity 0.3s ease;
  pointer-events: none;
}
.reader-chrome.hidden { transform: translateY(-20px); opacity: 0; }
.reader-chrome > * { pointer-events: auto; }

.chrome-top {
  top: 0; padding-top: max(16px, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
}
.chrome-bottom {
  bottom: 0; padding-bottom: max(16px, env(safe-area-inset-bottom));
}

.back-link {
  color: var(--reader-text); text-decoration: none; font-size: 15px; font-weight: 500;
  display: flex; align-items: center; gap: 6px; opacity: 0.7; transition: opacity 0.15s;
}
.back-link:hover { opacity: 1; }

.reader-title-center { font-size: 15px; font-weight: 500; text-align: center; flex: 1; opacity: 0.6; }

/* Thin progress bar — like Dropbox */
.progress-line { height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; overflow: hidden; }
.progress-line-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.3s ease; }
.page-counter { font-size: 12px; color: var(--reader-muted); text-align: center; margin-top: 8px; letter-spacing: 0.02em; }

/* Page stage */
.page-container {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
.page-container img {
  max-width: 100%; max-height: 100%; object-fit: contain;
  transition: opacity 0.2s ease; will-change: transform;
}

/* Spatial comments — Dropbox-style pins */
.pin-layer { position: absolute; inset: 0; z-index: 50; pointer-events: none; }
.pin { 
  position: absolute; width: 28px; height: 28px; border-radius: 50%;
  background: var(--pin-color); color: #000; font-size: 12px; font-weight: 700;
  display: grid; place-items: center; cursor: pointer; pointer-events: auto;
  box-shadow: 0 2px 12px rgba(212,175,55,0.4); transition: transform 0.15s ease;
  border: 2px solid rgba(255,255,255,0.3);
}
.pin:hover { transform: scale(1.15); }
.pin::after {
  content: ''; position: absolute; width: 40px; height: 40px;
  border-radius: 50%; border: 1px solid var(--pin-color);
  animation: pin-pulse 2s ease-in-out infinite;
}
@keyframes pin-pulse {
  0%, 100% { transform: scale(0.8); opacity: 0.6; }
  50% { transform: scale(1.2); opacity: 0; }
}

/* Comment popover */
.pin-popover {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%) scale(0.9);
  background: rgba(20,20,20,0.95); backdrop-filter: blur(16px);
  padding: 12px 16px; border-radius: 12px; width: 220px;
  opacity: 0; pointer-events: none; transition: all 0.2s ease;
  border: 1px solid rgba(255,255,255,0.06); z-index: 60;
}
.pin.active .pin-popover { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
.pin-popover::after {
  content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
  border-width: 6px 6px 0; border-style: solid; border-color: rgba(20,20,20,0.95) transparent transparent;
}
.popover-author { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
.popover-text { font-size: 13px; color: var(--reader-text); line-height: 1.4; }

/* Add comment button */
.add-pin-btn {
  position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); right: 24px;
  width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: #000;
  border: none; font-size: 24px; cursor: pointer; z-index: 200;
  display: grid; place-items: center; box-shadow: 0 4px 16px rgba(212,175,55,0.3);
  transition: transform 0.15s ease; font-weight: 300;
}
.add-pin-btn:active { transform: scale(0.9); }
.add-pin-btn.hidden { transform: scale(0); opacity: 0; pointer-events: none; }

/* Tap zones */
.tap-zone { position: absolute; top: 0; bottom: 0; width: 33.33%; z-index: 40; }
.tap-zone-left { left: 0; }
.tap-zone-center { left: 33.33%; }
.tap-zone-right { left: 66.66%; }

/* Loading */
.skeleton { 
  width: 60%; aspect-ratio: 2/3; border-radius: 8px;
  background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Toast */
.toast {
  position: fixed; bottom: max(80px, env(safe-area-inset-bottom) + 60px); left: 50%;
  transform: translateX(-50%) translateY(20px); background: rgba(30,30,30,0.95);
  color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 14px;
  opacity: 0; transition: all 0.3s ease; z-index: 300; pointer-events: none;
  backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* RTL */
[dir="rtl"] .add-pin-btn { right: auto; left: 24px; }
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing-view" class="view active">
  <div class="landing-container">
    <div class="brand">Private Reading Club</div>
    <h1>Restless Worlds</h1>
    <p class="subtitle">A private space for immersive manga reading. Clean, simple, no distractions — just the artwork and the story.</p>
    
    <div class="cta-row">
      <button class="btn btn-primary" onclick="enterReader()">Enter as Guest</button>
      <button class="btn btn-secondary" onclick="toggleLang()">EN / AR</button>
    </div>
    
    <div class="section-title">Library</div>
    <div class="manga-list">
      <div class="manga-item" onclick="enterReader()">
        <div class="manga-thumb"><img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?w=100&h=140&fit=crop" alt="Moons Road"></div>
        <div class="manga-info">
          <div class="manga-name">Moons Road <span class="lock-badge" style="display:none">✦</span></div>
          <div class="manga-detail">Chapter 1 · 8 pages</div>
        </div>
        <div class="manga-arrow">→</div>
      </div>
    </div>
  </div>
</div>

<!-- READER -->
<div id="reader-view" class="view">
  <div class="reader-chrome" id="chrome-top">
    <a href="#" class="back-link" onclick="exitReader(event)">← <span data-i18n="back">Back</span></a>
    <div class="reader-title-center" id="reader-title">Moons Road — Chapter 1</div>
    <div style="width:60px"></div>
  </div>
  
  <div class="page-container" id="page-stage">
    <div class="skeleton" id="skeleton"></div>
    <img id="page-img" src="" alt="Page" style="display:none">
    <div class="pin-layer" id="pin-layer"></div>
    <div class="tap-zone tap-zone-left" onclick="goPrev()"></div>
    <div class="tap-zone tap-zone-center" onclick="toggleChrome()"></div>
    <div class="tap-zone tap-zone-right" onclick="goNext()"></div>
  </div>
  
  <div class="reader-chrome" id="chrome-bottom">
    <div class="progress-line"><div class="progress-line-fill" id="progress-fill"></div></div>
    <div class="page-counter" id="page-counter">Page 1 / 8</div>
  </div>
  
  <button class="add-pin-btn" id="add-pin-btn" onclick="startAddingPin()">+</button>
</div>

<div class="toast" id="toast"></div>

<script>
const PAGES = [
  'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1618336753974-aae8e04506aa?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1635805737707-575885ab0820?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1560972550-aba3456b5564?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1607604276583-eef5f0b7fe7a?w=800&h=1200&fit=crop',
  'https://images.unsplash.com/photo-1560167016-022b78a0258e?w=800&h=1200&fit=crop',
];

const COMMENTS = [
  { page: 0, x: 35, y: 28, author: 'Meem Yaser', text: 'This panel composition took 3 days to perfect.' },
  { page: 0, x: 72, y: 55, author: 'Sara K.', text: 'The shading here is incredible 🔥' },
  { page: 2, x: 45, y: 40, author: 'Admin', text: 'Foreshadowing for Chapter 5' },
  { page: 4, x: 60, y: 22, author: 'Meem Yaser', text: 'My favorite spread in the entire series.' },
];

let currentPage = 0;
let chromeVisible = true;
let scale = 1, panX = 0, panY = 0;
let isPinning = false;

function enterReader() {
  document.getElementById('landing-view').classList.remove('active');
  document.getElementById('reader-view').classList.add('active');
  currentPage = 0;
  loadPage();
}

function exitReader(e) {
  if (e) e.preventDefault();
  document.getElementById('reader-view').classList.remove('active');
  document.getElementById('landing-view').classList.add('active');
  resetZoom();
}

function loadPage() {
  const img = document.getElementById('page-img');
  const skel = document.getElementById('skeleton');
  skel.style.display = 'block';
  img.style.display = 'none';
  img.style.opacity = '0';
  
  const pre = new Image();
  pre.onload = () => {
    img.src = PAGES[currentPage];
    img.style.display = 'block';
    setTimeout(() => img.style.opacity = '1', 10);
    skel.style.display = 'none';
    resetZoom();
    renderPins();
    updateProgress();
  };
  pre.onerror = () => {
    img.src = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200"><rect fill="%23050505" width="800" height="1200"/><text fill="%23333" x="400" y="580" text-anchor="middle" font-family="sans-serif" font-size="20">Page ${currentPage + 1}</text></svg>`;
    img.style.display = 'block';
    img.style.opacity = '1';
    skel.style.display = 'none';
  };
  pre.src = PAGES[currentPage];
}

function goNext() {
  if (currentPage < PAGES.length - 1) { currentPage++; loadPage(); }
  else toast('End of chapter');
}

function goPrev() {
  if (currentPage > 0) { currentPage--; loadPage(); }
}

function updateProgress() {
  document.getElementById('progress-fill').style.width = ((currentPage + 1) / PAGES.length * 100) + '%';
  document.getElementById('page-counter').textContent = `Page ${currentPage + 1} / ${PAGES.length}`;
}

function toggleChrome() {
  chromeVisible = !chromeVisible;
  document.getElementById('chrome-top').classList.toggle('hidden', !chromeVisible);
  document.getElementById('chrome-bottom').classList.toggle('hidden', !chromeVisible);
  document.getElementById('add-pin-btn').classList.toggle('hidden', !chromeVisible);
}

// Zoom/Pan
const stage = document.getElementById('page-stage');
let pointers = new Map(), pinching = false, panning = false, startDist = 0, startScale = 1;

stage.addEventListener('pointerdown', e => {
  e.preventDefault();
  pointers.set(e.pointerId, e);
  if (pointers.size === 2) {
    pinching = true;
    const pts = [...pointers.values()];
    startDist = Math.hypot(pts[1].clientX - pts[0].clientX, pts[1].clientY - pts[0].clientY);
    startScale = scale;
  } else if (pointers.size === 1 && scale > 1) {
    panning = true;
  }
}, { passive: false });

stage.addEventListener('pointermove', e => {
  e.preventDefault();
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, e);
  if (pinching && pointers.size === 2) {
    const pts = [...pointers.values()];
    const d = Math.hypot(pts[1].clientX - pts[0].clientX, pts[1].clientY - pts[0].clientY);
    scale = Math.max(1, Math.min(5, startScale * (d / startDist)));
    applyTransform();
  }
}, { passive: false });

stage.addEventListener('pointerup', e => {
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinching = false;
  if (pointers.size === 0) panning = false;
});

function applyTransform() {
  document.getElementById('page-img').style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

function resetZoom() { scale = 1; panX = 0; panY = 0; applyTransform(); }

// Double-tap zoom
let lastTap = 0;
stage.addEventListener('click', e => {
  const now = Date.now();
  if (now - lastTap < 300) {
    if (scale > 1) resetZoom();
    else { scale = 2.5; applyTransform(); }
  }
  lastTap = now;
});

// Pins
function renderPins() {
  const layer = document.getElementById('pin-layer');
  layer.innerHTML = '';
  COMMENTS.filter(c => c.page === currentPage).forEach((c, i) => {
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.style.left = c.x + '%';
    pin.style.top = c.y + '%';
    pin.innerHTML = (i + 1) + `
      <div class="pin-popover">
        <div class="popover-author">${c.author}</div>
        <div class="popover-text">${c.text}</div>
      </div>`;
    pin.onclick = e => { e.stopPropagation(); document.querySelectorAll('.pin').forEach(p => p.classList.remove('active')); pin.classList.toggle('active'); };
    layer.appendChild(pin);
  });
}

function startAddingPin() {
  isPinning = true;
  toast('Tap anywhere on the page to add a comment');
  stage.style.cursor = 'crosshair';
}

stage.addEventListener('click', e => {
  if (!isPinning) return;
  const rect = stage.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  COMMENTS.push({ page: currentPage, x, y, author: 'You', text: 'New comment' });
  renderPins();
  isPinning = false;
  stage.style.cursor = '';
  toast('Comment added!');
});

// Keyboard
document.addEventListener('keydown', e => {
  if (!document.getElementById('reader-view').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  else if (e.key === 'Escape') { if (chromeVisible) exitReader(); }
});

// Swipe
let touchStartX = 0;
stage.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
stage.addEventListener('touchend', e => {
  if (scale > 1) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) { dx < 0 ? goNext() : goPrev(); }
}, { passive: true });

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleLang() {
  const isRTL = document.documentElement.dir === 'rtl';
  document.documentElement.dir = isRTL ? 'ltr' : 'rtl';
  toast(isRTL ? 'English' : 'Arabic');
}

// Close pin popovers when tapping elsewhere
stage.addEventListener('click', e => {
  if (e.target.closest('.pin')) return;
  document.querySelectorAll('.pin').forEach(p => p.classList.remove('active'));
});
</script>
</body>
</html>
