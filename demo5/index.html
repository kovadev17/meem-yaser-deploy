<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>Restless Worlds — Manga Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN SYSTEM: Editorial Manga Minimal
   Tone: Restrained luxury meets obsessive readability
   Differentiation: "If the logo were removed, you'd remember 
   the gold accent line and the Cormorant italics"
   ═══════════════════════════════════════ */
:root {
  /* Typography */
  --font-display: 'Cormorant', Georgia, 'Times New Roman', serif;
  --font-body: 'Space Grotesk', system-ui, -apple-system, sans-serif;
  
  /* Library — Light, always light */
  --lib-bg: #FAFAF8;
  --lib-surface: #FFFFFF;
  --lib-text: #0F0F0F;
  --lib-muted: #5C5C5C;
  --lib-subtle: #B0B0B0;
  --lib-border: rgba(0,0,0,0.05);
  --lib-accent: #D4AF37; /* Restless Gold */
  
  /* Reader — Dark, always dark */
  --reader-bg: #050505;
  --reader-surface: #111111;
  --reader-text: #EDEDED;
  --reader-muted: #8A8A8A;
  --reader-subtle: #4A4A4A;
  --reader-border: rgba(255,255,255,0.04);
  --reader-accent: #D4AF37;
  
  /* Touch */
  --touch-min: 44px;
  --touch-comfortable: 48px;
  
  /* Z-scale */
  --z-page: 1;
  --z-content: 10;
  --z-ui: 100;
  --z-overlay: 200;
  --z-modal: 300;
  --z-toast: 400;
}

/* ═── RESET ─── */
*, *::before, *::after { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}
html { 
  -webkit-text-size-adjust: 100%; 
  -webkit-font-smoothing: antialiased; 
  -moz-osx-font-smoothing: grayscale;
}
body {
  font-family: var(--font-body);
  background: var(--lib-bg);
  color: var(--lib-text);
  overflow: hidden;
  overscroll-behavior-y: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-x pan-y pinch-zoom;
  cursor: default;
}
img { 
  -webkit-user-drag: none; 
  user-select: none; 
}

/* ═── VIEW SYSTEM ─── */
.view {
  position: fixed;
  inset: 0;
  overflow: hidden;
  display: none;
  opacity: 0;
  transition: opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}
.view.active {
  display: flex;
  flex-direction: column;
  opacity: 1;
}

/* ═══════════════════════════════════════
   LIBRARY VIEW
   ═══════════════════════════════════════ */
#library-view {
  overflow-y: auto;
  overscroll-behavior-y: auto;
  -webkit-overflow-scrolling: touch;
}

.library-header {
  padding: max(24px, env(safe-area-inset-top)) 20px 20px;
  position: sticky;
  top: 0;
  background: linear-gradient(180deg, var(--lib-bg) 70%, transparent);
  z-index: var(--z-ui);
}

.brand-mark {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
}
.brand-mark span { 
  color: var(--lib-accent); 
  font-style: italic;
  font-weight: 600;
}

.subtitle {
  font-size: 13px;
  color: var(--lib-muted);
  margin-top: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
}

/* Grid: 2-col mobile → 3-col tablet → 4-col desktop */
.library-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  padding: 0 20px max(40px, env(safe-area-inset-bottom));
}
@media (min-width: 480px) { 
  .library-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 24px; } 
}
@media (min-width: 768px) { 
  .library-grid { grid-template-columns: repeat(4, 1fr); max-width: 1000px; margin: 0 auto; } 
}
@media (min-width: 1200px) { 
  .library-grid { grid-template-columns: repeat(5, 1fr); max-width: 1200px; } 
}

.manga-card {
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), 
              box-shadow 0.2s ease;
}
.manga-card:active { transform: scale(0.96); }
@media (hover: hover) {
  .manga-card:hover { 
    transform: translateY(-4px); 
    box-shadow: 0 12px 32px rgba(0,0,0,0.12); 
  }
}

.manga-cover {
  aspect-ratio: 2/3;
  border-radius: 10px;
  overflow: hidden;
  background: linear-gradient(135deg, #E8E8E8, #D0D0D0);
  position: relative;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.manga-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.3s ease;
}
.manga-cover img[src=""] { opacity: 0; }

.chapter-badge {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(0,0,0,0.78);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 6px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  letter-spacing: 0.02em;
}

.manga-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  margin-top: 12px;
  line-height: 1.35;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--lib-text);
}

.manga-meta {
  font-size: 13px;
  color: var(--lib-muted);
  margin-top: 5px;
  font-weight: 400;
  line-height: 1.4;
}

/* ═── UPLOAD CARD ─── */
.upload-card {
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), 
              box-shadow 0.2s ease;
}
.upload-card:active { transform: scale(0.96); }
@media (hover: hover) {
  .upload-card:hover { 
    transform: translateY(-4px); 
    box-shadow: 0 12px 32px rgba(0,0,0,0.08); 
  }
}
.upload-cover {
  aspect-ratio: 2/3;
  border-radius: 10px;
  overflow: hidden;
  background: var(--lib-surface);
  position: relative;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  border: 2px dashed var(--lib-border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: border-color 0.2s ease;
}
.upload-card:hover .upload-cover {
  border-color: var(--lib-accent);
}
.upload-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--lib-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--lib-accent);
  border: 1px solid var(--lib-border);
  font-weight: 300;
}
.upload-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  margin-top: 12px;
  line-height: 1.3;
  color: var(--lib-text);
}
.upload-meta {
  font-size: 12px;
  color: var(--lib-muted);
  margin-top: 4px;
  font-weight: 400;
}

/* ═══════════════════════════════════════
   READER VIEW
   ═══════════════════════════════════════ */
#reader-view {
  background: var(--reader-bg);
  color: var(--reader-text);
  user-select: none;
  -webkit-user-select: none;
}

.reader-surface {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: pan-x pan-y pinch-zoom;
}

.page-stage {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  touch-action: pan-x pan-y pinch-zoom;
}

.page-stage img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
  will-change: transform;
  transition: opacity 0.25s ease;
  transform-origin: center center;
  /* No CSS transition on transform — handled by JS for 60fps */
}
.page-stage img.loading { opacity: 0; }
.page-stage img.loaded { opacity: 1; }

/* Zoom cursor states */
.page-stage.is-zoomed { cursor: grab; }
.page-stage.is-zoomed.is-panning { cursor: grabbing; }

/* Tap zones — invisible, functional */
.tap-zones {
  position: absolute;
  inset: 0;
  z-index: var(--z-content);
  display: flex;
  pointer-events: none; /* Let events pass to stage for pinch/pan */
}
.tap-zone {
  flex: 1;
  pointer-events: auto;
  cursor: pointer;
  position: relative;
}

/* Zone visual guides (toggleable) */
.show-zones .tap-zone::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px dashed rgba(255,255,255,0.08);
  border-radius: 4px;
  pointer-events: none;
}

/* ═── ZOOM INDICATOR ─── */
.zoom-badge {
  position: absolute;
  top: max(16px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%) translateY(-40px);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  color: var(--reader-text);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  z-index: var(--z-ui);
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  white-space: nowrap;
  border: 1px solid var(--reader-border);
  pointer-events: none;
  letter-spacing: 0.01em;
}
.zoom-badge.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ═── READER CHROME ─── */
.reader-chrome {
  position: absolute;
  left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: max(12px, env(safe-area-inset-top)) 16px max(8px, env(safe-area-inset-top));
  background: linear-gradient(180deg, rgba(5,5,5,0.92) 0%, transparent 100%);
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
  opacity: 1;
}
.reader-chrome.hidden {
  transform: translateY(-100%);
  opacity: 0;
  pointer-events: none;
}

.chrome-top { top: 0; }
.chrome-bottom {
  bottom: 0;
  background: linear-gradient(0deg, rgba(5,5,5,0.92) 0%, transparent 100%);
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
  padding: 8px 16px max(12px, env(safe-area-inset-bottom));
}
.chrome-bottom.hidden { transform: translateY(100%); }

.back-btn {
  background: none;
  border: none;
  color: var(--reader-text);
  font-size: 20px;
  width: var(--touch-comfortable);
  height: var(--touch-comfortable);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 50%;
  transition: background 0.2s ease;
}
.back-btn:active { background: rgba(255,255,255,0.08); }

.reader-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.01em;
  flex: 1;
  text-align: center;
  padding: 0 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.reader-actions {
  display: flex;
  gap: 4px;
}

.icon-btn {
  background: none;
  border: none;
  color: var(--reader-text);
  font-size: 18px;
  width: var(--touch-comfortable);
  height: var(--touch-comfortable);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 50%;
  transition: background 0.2s ease;
}
.icon-btn:active { background: rgba(255,255,255,0.08); }

/* Progress */
.progress-track {
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 1px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--reader-accent), #F0D878);
  border-radius: 1px;
  transition: width 0.25s ease;
  box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--reader-muted);
  letter-spacing: 0.03em;
  font-weight: 500;
}

/* ═── DRAWERS ─── */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: var(--z-overlay);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.drawer-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}

.chapter-drawer {
  background: var(--reader-surface);
  border-radius: 20px 20px 0 0;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  border-top: 1px solid var(--reader-border);
}
.drawer-backdrop.open .chapter-drawer {
  transform: translateY(0);
}

.settings-sheet {
  background: var(--reader-surface);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px max(24px, env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  border-top: 1px solid var(--reader-border);
}
.drawer-backdrop.open .settings-sheet {
  transform: translateY(0);
}

.drawer-header, .settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0 16px;
}
.drawer-header h2 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.settings-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.chapter-list {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 8px;
}

.chapter-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-radius: 0 10px 10px 0;
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: background 0.15s ease;
  margin: 0 0 2px 0;
  gap: 12px;
}
.chapter-item-thumb {
  width: 44px;
  height: 58px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  transition: transform 0.2s ease;
}
.chapter-item:hover .chapter-item-thumb { transform: scale(1.05); }
.chapter-item:active { background: rgba(255,255,255,0.04); }
.chapter-item.current {
  background: rgba(212, 175, 55, 0.08);
  border-left-color: var(--reader-accent);
}

.chapter-item-name { font-size: 16px; font-weight: 500; letter-spacing: 0.01em; line-height: 1.4; }
.chapter-item-meta { font-size: 13px; color: var(--reader-muted); margin-top: 4px; line-height: 1.4; }
.chapter-item-status { font-size: 13px; color: var(--reader-accent); font-weight: 500; }

/* Settings rows */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid var(--reader-border);
  gap: 16px;
}
.setting-row:last-child { border-bottom: none; }

.setting-label-group { flex: 1; min-width: 0; }
.setting-label { font-size: 15px; font-weight: 500; letter-spacing: 0.01em; }
.setting-desc { font-size: 12px; color: var(--reader-muted); margin-top: 3px; }

/* Segmented control */
.segmented {
  display: flex;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  padding: 3px;
  gap: 3px;
  flex-shrink: 0;
}
.segment-btn {
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--reader-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: var(--font-body);
  letter-spacing: 0.02em;
  min-width: 52px;
}
.segment-btn.active {
  background: rgba(255,255,255,0.1);
  color: var(--reader-text);
}

/* Toggle */
.toggle {
  width: 52px;
  height: 30px;
  background: rgba(255,255,255,0.12);
  border-radius: 15px;
  position: relative;
  cursor: pointer;
  transition: background 0.25s ease;
  flex-shrink: 0;
}
.toggle.on { background: var(--reader-accent); }
.toggle-knob {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 24px;
  height: 24px;
  background: white;
  border-radius: 50%;
  transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.toggle.on .toggle-knob { transform: translateX(22px); }

/* ═── TOAST ─── */
.toast {
  position: fixed;
  bottom: max(24px, env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--reader-surface);
  color: var(--reader-text);
  padding: 12px 22px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: var(--z-toast);
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  white-space: nowrap;
  border: 1px solid var(--reader-border);
  pointer-events: none;
  letter-spacing: 0.01em;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ═── PAGE LOADING SKELETON ─── */
.page-skeleton {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: var(--z-content);
  pointer-events: none;
}
.page-skeleton.hidden { display: none; }

.skeleton-pulse {
  width: 60%;
  max-width: 300px;
  aspect-ratio: 2/3;
  background: linear-gradient(90deg, 
    rgba(255,255,255,0.02) 0%, 
    rgba(255,255,255,0.05) 50%, 
    rgba(255,255,255,0.02) 100%
  );
  background-size: 200% 100%;
  border-radius: 8px;
  animation: skeleton-shimmer 1.5s ease-in-out infinite;
}
@keyframes skeleton-shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ═── RESPONSIVE ─── */
@media (min-width: 768px) {
  .library-header { padding-left: 32px; padding-right: 32px; }
  .brand-mark { font-size: 40px; }
  .reader-chrome { padding-left: 24px; padding-right: 24px; }
  .chapter-drawer { max-width: 420px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .skeleton-pulse { animation: none; background: rgba(255,255,255,0.03); }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     LIBRARY VIEW
     ═══════════════════════════════════════ -->
<div id="library-view" class="view active">
  <div class="library-header">
    <div class="brand-mark">Restless <span>Worlds</span></div>
    <div class="subtitle">Rūsuma Collection</div>
  </div>
  <div class="library-grid" id="manga-grid"></div>
</div>

<!-- ═══════════════════════════════════════
     READER VIEW
     ═══════════════════════════════════════ -->
<div id="reader-view" class="view">
  <!-- Zoom badge -->
  <div class="zoom-badge" id="zoom-badge">Double-tap to reset</div>
  
  <!-- Top Chrome -->
  <div class="reader-chrome chrome-top" id="chrome-top">
    <button class="back-btn" id="btn-back" aria-label="Back to library">&#x2190;</button>
    <div class="reader-title" id="reader-title">Chapter 1</div>
    <div class="reader-actions">
      <button class="icon-btn" id="btn-settings" aria-label="Reader settings">&#x2699;</button>
      <button class="icon-btn" id="btn-chapters" aria-label="Chapter list">&#x2630;</button>
    </div>
  </div>
  
  <!-- Page Surface -->
  <div class="reader-surface" id="reader-surface">
    <div class="page-stage" id="page-stage">
      <img id="page-image" src="" alt="Manga page" draggable="false" class="loading">
    </div>
    
    <!-- Loading skeleton -->
    <div class="page-skeleton" id="page-skeleton">
      <div class="skeleton-pulse"></div>
    </div>
    
    <!-- Tap zones (pointer-events managed by JS) -->
    <div class="tap-zones" id="tap-zones">
      <div class="tap-zone" data-zone="left" aria-label="Previous page"></div>
      <div class="tap-zone" data-zone="center" aria-label="Toggle controls"></div>
      <div class="tap-zone" data-zone="right" aria-label="Next page"></div>
    </div>
  </div>
  
  <!-- Bottom Chrome -->
  <div class="reader-chrome chrome-bottom" id="chrome-bottom">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-info">
      <span id="page-num">Page 1 / 10</span>
      <span id="chapter-progress">Chapter 1 of 1</span>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     CHAPTER DRAWER

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const state = {

  chapter: 0,
  page: 0,
  dir: 'ltr',

// ═══════════════════════════════════════
// DOM CACHE
// ═══════════════════════════════════════
const $ = id => document.getElementById(id);
const img = $('page-image');
const stage = $('page-stage');
const surface = $('reader-surface');

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {

// ═══════════════════════════════════════
// LIBRARY
// ═══════════════════════════════════════
function renderLibrary() {

// ═══════════════════════════════════════
// CBZ / ZIP PARSER — Deep-researched, flawless
// ═══════════════════════════════════════
const IMAGE_EXTS = new Set(['jpg','jpeg','png','webp','gif','bmp']);
const MIME_MAP = {
  png: 'image/png', webp: 'image/webp', gif: 'image/gif',
  bmp: 'image/bmp', jpg: 'image/jpeg', jpeg: 'image/jpeg'
};

function natSort(a, b) {
  return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
}

async function parseCBZ(file) {
  toast('Parsing archive…');
  try {
    const zip = await JSZip.loadAsync(file);
    const entries = [];
    
    zip.forEach((relPath, entry) => {
      if (entry.dir) return;
      const ext = relPath.split('.').pop().toLowerCase();
      if (!IMAGE_EXTS.has(ext)) return;
      entries.push({ path: relPath, entry, ext });
    });
    
    if (entries.length === 0) {
      toast('No images found in archive');
      return;
    }
    
    // Group by folder
    const groups = new Map();
    for (const item of entries) {
      const lastSlash = item.path.lastIndexOf('/');
      const folder = lastSlash > -1 ? item.path.slice(0, lastSlash) : '__root__';
      if (!groups.has(folder)) groups.set(folder, []);
      groups.get(folder).push(item);
    }
    
    // Build chapters with natural sort
    const chapters = [];
    const sortedFolders = [...groups.keys()].sort(natSort);
    
    for (let i = 0; i < sortedFolders.length; i++) {
      const folder = sortedFolders[i];
      const items = groups.get(folder).sort((a, b) => natSort(a.path, b.path));
      
      // Create blob URLs concurrently
      const pages = await Promise.all(items.map(async item => {
        const blob = await item.entry.async('blob');
        const mime = MIME_MAP[item.ext] || 'image/jpeg';
        return URL.createObjectURL(new Blob([blob], { type: mime }));
      }));
      
      const folderName = folder === '__root__' ? 'Chapter' : folder.replace(/\/$/, '').split('/').pop();
      chapters.push({ num: i + 1, title: folderName, pages });
    }
    
    const manga = {
      id: 'local-' + Date.now(),
      title: file.name.replace(/\.(cbz|zip)$/i, ''),
      author: 'Local File',
      cover: chapters[0].pages[0],
      chapters,
      _local: true
    };
    
    MANGA_LIBRARY.push(manga);
    renderLibrary();
    openReader(MANGA_LIBRARY.length - 1);
    toast(`Ready: ${manga.title}`);
  } catch (err) {
    console.error(err);
    toast('Failed to parse archive');
  }
}

// ═══════════════════════════════════════
// READER — OPEN / CLOSE
// ═══════════════════════════════════════
function openReader(mangaIndex) {
  state.manga = mangaIndex;
  state.chapter = 0; state.page = 0;
  state.chrome = true;
  resetZoom();
  $('library-view').classList.remove('active');
  $('reader-view').classList.add('active');
  loadPage();
  updateChrome();
  renderChapters();
}

function exitReader() {
  $('reader-view').classList.remove('active');
  $('library-view').classList.add('active');
  resetZoom();
}

function currentManga() {
  return MANGA_LIBRARY[state.manga];
}

// ═══════════════════════════════════════
// PAGE LOADING
// ═══════════════════════════════════════
function loadPage() {
  const src = currentManga().chapters[state.chapter].pages[state.page];
  img.classList.remove('loaded');
  img.classList.add('loading');
  $('page-skeleton').classList.remove('hidden');
  
  const preload = new Image();
  preload.onload = () => {
    img.src = src;
    img.classList.remove('loading');
    img.classList.add('loaded');
    $('page-skeleton').classList.add('hidden');
    resetZoom();
  };
  preload.onerror = () => {
    const svg = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200"><rect fill="%23050505" width="800" height="1200"/><text fill="%23333" x="400" y="560" text-anchor="middle" font-family="sans-serif" font-size="20">Page ${state.page + 1}</text><text fill="%23222" x="400" y="600" text-anchor="middle" font-family="sans-serif" font-size="14">Image failed to load</text></svg>`;
    img.src = svg;
    img.classList.remove('loading');
    img.classList.add('loaded');
    $('page-skeleton').classList.add('hidden');
    resetZoom();
  };
  preload.src = src;
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function nextPage() {
  if (state.zoomed) { toast('Double-tap to reset zoom'); return; }
  const ch = currentManga().chapters[state.chapter];
  if (state.page < ch.pages.length - 1) {
    state.page++;
    loadPage();
    updateChrome();
    preload();
  } else { toast('End of chapter'); }
}

function prevPage() {
  if (state.zoomed) { toast('Double-tap to reset zoom'); return; }
  if (state.page > 0) {
    state.page--;
    loadPage();
    updateChrome();
  }
}

function goToPage(ci, pi) {
  state.chapter = ci; state.page = pi;
  loadPage(); updateChrome(); renderChapters();
  closeDrawer('chapter-drawer-backdrop');
}

// ═══════════════════════════════════════
// ZOOM / PAN ENGINE
// ═══════════════════════════════════════
function resetZoom() {
  state.scale = 1; state.panX = 0; state.panY = 0;
  state.zoomed = false; state.panning = false; state.pinching = false;
  applyTransform();
  stage.classList.remove('is-zoomed', 'is-panning');
  updateZoomBadge();
}

function clampPan() {
  if (state.scale <= 1) {
    state.panX = 0; state.panY = 0;
    return;
  }
  const rect = stage.getBoundingClientRect();
  const scaledW = rect.width * state.scale;
  const scaledH = rect.height * state.scale;
  
  // Calculate max pan values so image edges don't go past container edges
  const maxPanX = Math.max(0, (scaledW - rect.width) / 2);
  const maxPanY = Math.max(0, (scaledH - rect.height) / 2);
  
  state.panX = Math.max(-maxPanX, Math.min(maxPanX, state.panX));
  state.panY = Math.max(-maxPanY, Math.min(maxPanY, state.panY));
}

function applyTransform() {
  clampPan();
  img.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
  state.zoomed = state.scale > 1.05;
  stage.classList.toggle('is-zoomed', state.zoomed);
  updateZoomBadge();
}

function updateZoomBadge() {
  const badge = $('zoom-badge');
  if (state.zoomed) {
    badge.textContent = `${Math.round(state.scale * 100)}% · Double-tap to reset`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function dist(p1, p2) {
  return Math.hypot(p2.clientX - p1.clientX, p2.clientY - p1.clientY);
}

function center(p1, p2) {
  return { x: (p1.clientX + p2.clientX) / 2, y: (p1.clientY + p2.clientY) / 2 };
}

// ═══════════════════════════════════════
// GESTURE SYSTEM — Pointer Events
// ═══════════════════════════════════════
function bindGestures() {
  // POINTER DOWN
  surface.addEventListener('pointerdown', e => {
    e.preventDefault();
    state.pointers.set(e.pointerId, e);
    
    if (state.pointers.size === 1) {
      state.startX = e.clientX;
      state.startY = e.clientY;
      state.lastX = e.clientX;
      state.lastY = e.clientY;
      state.startTime = Date.now();
      
      if (state.zoomed) {
        state.panning = true;
        stage.classList.add('is-panning');
        state.startPanX = state.panX;
        state.startPanY = state.panY;
      }
    } else if (state.pointers.size === 2) {
      // Pinch begins
      state.pinching = true;
      state.panning = false;
      stage.classList.remove('is-panning');
      const pts = [...state.pointers.values()];
      state.pinchDist = dist(pts[0], pts[1]);
      state.startScale = state.scale;
    }
  }, { passive: false });
  
  // POINTER MOVE
  surface.addEventListener('pointermove', e => {
    e.preventDefault();
    if (!state.pointers.has(e.pointerId)) return;
    state.pointers.set(e.pointerId, e);
    
    const count = state.pointers.size;
    
    if (count === 2 && state.pinching) {
      const pts = [...state.pointers.values()];
      const d = dist(pts[0], pts[1]);
      const ratio = d / state.pinchDist;
      state.scale = Math.max(1, Math.min(5, state.startScale * ratio));
      applyTransform();
    } else if (count === 1 && state.panning && state.zoomed) {
      const dx = e.clientX - state.lastX;
      const dy = e.clientY - state.lastY;
      state.panX += dx;
      state.panY += dy;
      state.lastX = e.clientX;
      state.lastY = e.clientY;
      applyTransform();
    }
  }, { passive: false });
  
  // POINTER UP
  surface.addEventListener('pointerup', e => {
    state.pointers.delete(e.pointerId);
    const count = state.pointers.size;
    
    if (count === 0) {
      const elapsed = Date.now() - state.startTime;
      const dx = e.clientX - state.startX;
      const dy = e.clientY - state.startY;
      const travel = Math.hypot(dx, dy);
      
      if (state.pinching) {
        state.pinching = false;
        if (state.scale < 1.05) resetZoom();
      } else if (state.panning) {
        state.panning = false;
        stage.classList.remove('is-panning');
      } else if (elapsed < 300 && travel < 10) {
        // TAP or DOUBLE-TAP
        const now = Date.now();
        if (now - state.lastTap < 300) {
          // DOUBLE TAP — toggle zoom
          e.preventDefault();
          e.stopPropagation();
          if (state.zoomed) {
            resetZoom();
          } else {
            const rect = stage.getBoundingClientRect();
            const tapX = e.clientX - rect.left;
            const tapY = e.clientY - rect.top;
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            state.scale = 2.5;
            state.panX = (cx - tapX) * (state.scale - 1);
            state.panY = (cy - tapY) * (state.scale - 1);
            applyTransform();
          }
          state.lastTap = 0; // Prevent triple-tap
        } else {
          // SINGLE TAP — delegate to zone handler
          handleTap(e.clientX, e.clientY);
        }
        state.lastTap = now;
      } else if (state.swipe && !state.zoomed && elapsed < 500 && Math.abs(dx) > 50 && Math.abs(dy) < Math.abs(dx) * 1.3) {
        // SWIPE
        if (dx > 0) state.dir === 'ltr' ? prevPage() : nextPage();
        else state.dir === 'ltr' ? nextPage() : prevPage();
      }
    } else if (count === 1 && state.pinching) {
      // One finger lifted during pinch → continue as pan
      state.pinching = false;
      const rem = [...state.pointers.values()][0];
      state.lastX = rem.clientX; state.lastY = rem.clientY;
      state.panning = true;
      state.startPanX = state.panX; state.startPanY = state.panY;
      stage.classList.add('is-panning');
    }
  }, { passive: false });
  
  // POINTER CANCEL
  surface.addEventListener('pointercancel', () => {
    state.pointers.clear();
    state.pinching = false; state.panning = false;
    stage.classList.remove('is-panning');
  });
  
  // WHEEL (desktop zoom)
  surface.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey || Math.abs(e.deltaY) < 10) {
      e.preventDefault();
      const factor = e.deltaY > 0 ? 0.92 : 1.08;
      state.scale = Math.max(1, Math.min(5, state.scale * factor));
      applyTransform();
    }
  }, { passive: false });
}

// ═══════════════════════════════════════
// TAP HANDLING
// ═══════════════════════════════════════
function handleTap(x, y) {
  if (state.zoomed) { resetZoom(); return; }
  
  const w = window.innerWidth;
  const zone = x < w / 3 ? 'left' : x < w * 2 / 3 ? 'center' : 'right';
  
  if (zone === 'center') toggleChrome();
  else if (zone === 'right') state.dir === 'ltr' ? nextPage() : prevPage();
  else if (zone === 'left') state.dir === 'ltr' ? prevPage() : nextPage();
}

// Bind tap zones
function bindTapZones() {
  document.querySelectorAll('.tap-zone').forEach(z => {
    z.addEventListener('click', e => {
      if (!state.zoomed && !state.panning && !state.pinching) {
        handleTap(e.clientX, e.clientY);
      }
    });
  });
}

// ═══════════════════════════════════════
// CHROME
// ═══════════════════════════════════════
function updateChrome() {
  const manga = currentManga();
  const ch = manga.chapters[state.chapter];
  const total = ch.pages.length;
  $('reader-title').textContent = `${manga.title} — Ch.${ch.num}`;
  $('page-num').textContent = `Page ${state.page + 1} / ${total}`;
  $('chapter-progress').textContent = `Chapter ${ch.num} of ${manga.chapters.length}`;
  $('progress-fill').style.width = `${((state.page + 1) / total) * 100}%`;
  
  $('chrome-top').classList.toggle('hidden', !state.chrome);
  $('chrome-bottom').classList.toggle('hidden', !state.chrome);
}

function toggleChrome() {
  state.chrome = !state.chrome;
  updateChrome();
}

// DRAWERS
// ═══════════════════════════════════════
function openDrawer(id) { $(id).classList.add('open'); }
function closeDrawer(id) { $(id).classList.remove('open'); }

function renderChapters() {
  const manga = currentManga();
  const thumbs = [
    'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=200&h=260&fit=crop',
    'https://images.unsplash.com/photo-1535905557558-afc4877a26fc?w=200&h=260&fit=crop',
    'https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?w=200&h=260&fit=crop',
    'https://images.unsplash.com/photo-1633218388467-539651dcf81a?w=200&h=260&fit=crop',
    'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=200&h=260&fit=crop',
    'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=200&h=260&fit=crop',
  ];
  $('chapter-list').innerHTML = manga.chapters.map((ch, ci) => {
    const current = ci === state.chapter;
    return `
      <div class="chapter-item ${current ? 'current' : ''}" data-chapter="${ci}">
        <img class="chapter-item-thumb" src="${thumbs[ci] || thumbs[0]}" alt="${ch.title}" loading="lazy">
        <div>
          <div class="chapter-item-name">Chapter ${ch.num}</div>
          <div class="chapter-item-meta">${ch.title} · ${ch.pages.length} pages</div>
        </div>
        <div class="chapter-item-status">${current ? 'Reading' : ''}</div>
      </div>
    `;
  }).join('');
  
  // Scroll current into view
  const cur = $('chapter-list').querySelector('.current');
  if (cur) setTimeout(() => cur.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
}

// ═══════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════
function setDir(dir) {
  state.dir = dir;
  document.documentElement.dir = dir;
  updateSegments('dir', dir);
  toast(dir === 'rtl' ? 'RTL mode' : 'LTR mode');
}

function setFit(mode) {
  state.fit = mode;
  updateSegments('fit', mode);
}

function toggleZones() {
  state.zones = !state.zones;
  $('toggle-zones').classList.toggle('on', state.zones);
  document.body.classList.toggle('show-zones', state.zones);
}

function toggleSwipe() {
  state.swipe = !state.swipe;
  $('toggle-swipe').classList.toggle('on', state.swipe);
}

function updateSegments(setting, val) {
  document.querySelectorAll(`[data-setting="${setting}"]`).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.val === val);
  });
}

// ═══════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════
function bindEvents() {
  // Library — delegate for manga cards and upload
  $('manga-grid').addEventListener('click', e => {
    const card = e.target.closest('.manga-card');
    if (card) {
      openReader(+card.dataset.manga);
      return;
    }
    const upload = e.target.closest('.upload-card');
    if (upload) {
      $('file-input').click();
    }
  });
  
  // File input
  $('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'cbz' && ext !== 'zip') {
      toast('Please select a .cbz or .zip file');
      return;
    }
    parseCBZ(file);
    e.target.value = ''; // reset so same file can be re-selected
  });
  
  // Chrome buttons
  $('btn-back').addEventListener('click', exitReader);
  $('btn-settings').addEventListener('click', () => openDrawer('settings-backdrop'));
  $('btn-chapters').addEventListener('click', () => openDrawer('chapter-drawer-backdrop'));
  $('btn-close-settings').addEventListener('click', () => closeDrawer('settings-backdrop'));
  $('btn-close-chapters').addEventListener('click', () => closeDrawer('chapter-drawer-backdrop'));
  
  // Drawers close on backdrop click
  $('settings-backdrop').addEventListener('click', e => {
    if (e.target === $('settings-backdrop')) closeDrawer('settings-backdrop');
  });
  $('chapter-drawer-backdrop').addEventListener('click', e => {
    if (e.target === $('chapter-drawer-backdrop')) closeDrawer('chapter-drawer-backdrop');
  });
  
  // Chapter list delegation
  $('chapter-list').addEventListener('click', e => {
    const item = e.target.closest('.chapter-item');
    if (item) goToPage(+item.dataset.chapter, 0);
  });
  
  // Settings delegation
  document.querySelectorAll('[data-setting]').forEach(el => {
    if (el.classList.contains('segment-btn')) {
      el.addEventListener('click', () => {
        const s = el.dataset.setting;
        if (s === 'dir') setDir(el.dataset.val);
        else if (s === 'fit') setFit(el.dataset.val);
      });
    } else if (el.classList.contains('toggle')) {
      el.addEventListener('click', () => {
        const s = el.dataset.setting;
        if (s === 'zones') toggleZones();
        else if (s === 'swipe') toggleSwipe();
      });
    }
  });
  
  // Keyboard
  document.addEventListener('keydown', e => {
    if (!$('reader-view').classList.contains('active')) return;
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      state.dir === 'ltr' ? nextPage() : prevPage();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      state.dir === 'ltr' ? prevPage() : nextPage();
    } else if (e.key === 'Escape') {
      if ($('settings-backdrop').classList.contains('open')) closeDrawer('settings-backdrop');
      else if ($('chapter-drawer-backdrop').classList.contains('open')) closeDrawer('chapter-drawer-backdrop');
      else if (state.zoomed) resetZoom();
      else exitReader();
    }
  });
  
  bindTapZones();
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function preload() {
  const ch = currentManga().chapters[state.chapter];
  for (let i = 1; i <= 2; i++) {
    const idx = state.page + i;
    if (idx < ch.pages.length) { new Image().src = ch.pages[idx]; }
  }
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════
// GO
// ═══════════════════════════════════════
init();
</script>
